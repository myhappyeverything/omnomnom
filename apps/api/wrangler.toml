# Deployed (production) configuration. Local development overrides live in
# .dev.vars (gitignored, never deployed) — see .dev.vars.example and
# docs/cloudflare-setup.md for the full provisioning runbook.
#
# ONESIGNAL_APP_ID below is still a placeholder until you set up your own
# OneSignal app — see docs/cloudflare-setup.md.
name = "omnomnom-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Update this if you later move to a custom domain instead of *.pages.dev.
ALLOWED_ORIGIN = "https://omnomnom.pages.dev"
# Not secret — OneSignal app IDs are meant to be public (the Web SDK ships it
# client-side too). The REST API key used to *send* notifications is a secret;
# see docs/cloudflare-setup.md.
ONESIGNAL_APP_ID = "REPLACE_WITH_ONESIGNAL_APP_ID"

[[d1_databases]]
binding = "DB"
database_name = "omnomnom-db"
database_id = "85f3ff5e-552a-4eec-800a-ab02221e7708"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "e9086595a4144ba58b5588224bf1ed0f"

[[r2_buckets]]
binding = "MEAL_IMAGES"
bucket_name = "omnomnom-meal-images" # from `wrangler r2 bucket create omnomnom-meal-images`

[triggers]
# Every 5 minutes — matches TOLERANCE_MINUTES in reminderScheduler.ts, so a
# reminder's configured time always falls inside exactly one tick's window.
crons = ["*/5 * * * *"]
