<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OmNomNom mascot icon">
  <title>OmNomNom</title>
  <rect width="512" height="512" rx="112" fill="#FFF3E7"/>

  <!-- motion / nom lines -->
  <g stroke="#7D8B57" stroke-width="12" stroke-linecap="round">
    <line x1="76" y1="216" x2="104" y2="196"/>
    <line x1="66" y1="252" x2="98" y2="244"/>
    <line x1="74" y1="288" x2="104" y2="280"/>
    <line x1="436" y1="216" x2="408" y2="196"/>
    <line x1="446" y1="252" x2="414" y2="244"/>
    <line x1="438" y1="288" x2="408" y2="280"/>
  </g>

  <!-- body -->
  <path d="M256,104
           C346,104 404,166 404,254
           C404,318 380,362 336,388
           L176,388
           C132,362 108,318 108,254
           C108,166 166,104 256,104 Z"
        fill="#E07A4F"/>

  <!-- leaf sprout -->
  <g fill="#A7B89A">
    <path d="M256,120 C230,104 214,68 226,34 C254,50 270,88 262,120 Z"/>
    <path d="M256,120 C282,104 298,68 286,34 C258,50 242,88 250,120 Z"/>
  </g>

  <!-- eyes -->
  <g stroke="#4B3B30" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M188,230 Q212,202 236,230"/>
    <path d="M276,230 Q300,202 324,230"/>
  </g>

  <!-- open mouth -->
  <path d="M180,256 Q256,232 332,256 Q346,300 306,330 Q256,352 206,330 Q166,300 180,256 Z"
        fill="#4B3B30"/>

  <!-- snack held up in front of the mouth, with a bite taken out of its top -->
  <circle cx="256" cy="318" r="50" fill="#F6B6A6"/>
  <circle cx="256" cy="278" r="26" fill="#4B3B30"/>

  <!-- arms hugging the snack -->
  <g fill="#E07A4F">
    <ellipse cx="188" cy="330" rx="50" ry="58"/>
    <ellipse cx="324" cy="330" rx="50" ry="58"/>
  </g>
</svg>
