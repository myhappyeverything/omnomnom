name: Deploy

# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets —
# see docs/cloudflare-setup.md §9. Runs its own checks rather than depending
# on the separate CI workflow, so a push to main never deploys unverified code.
#
# Only handles the Worker + D1 migrations. The frontend deploys separately
# via Cloudflare Pages' own Git integration (connected directly to this
# repo, build command `npm run build:web`, output `apps/web/dist`) — running
# `wrangler pages deploy` here too would just be a redundant second
# deployment racing the native one on every push.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply omnomnom-db --remote

      - name: Deploy API (Cloudflare Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
